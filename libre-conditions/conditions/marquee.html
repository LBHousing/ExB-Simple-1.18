<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Conditions Marquee</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0a0e1a;overflow:hidden}
.marquee{overflow:hidden;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 0;white-space:nowrap}
.marquee-inner{display:inline-block;animation:scroll 40s linear infinite}
.marquee-inner span{font-size:13px;font-weight:500;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-right:60px}
.marquee-inner .hl{color:#D2333F}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
</style>
</head>
<body>
<div class="marquee"><div class="marquee-inner">
<span>HOUSING VIOLATIONS</span><span>EVICTION PATTERNS</span><span>REDLINING LEGACY</span><span class="hl">90 YEARS OF DISINVESTMENT</span><span>CODE ENFORCEMENT</span><span>DISPLACEMENT</span><span>HOUSING IS A HUMAN RIGHT</span><span>RACIAL COVENANTS</span>
<span>HOUSING VIOLATIONS</span><span>EVICTION PATTERNS</span><span>REDLINING LEGACY</span><span class="hl">90 YEARS OF DISINVESTMENT</span><span>CODE ENFORCEMENT</span><span>DISPLACEMENT</span><span>HOUSING IS A HUMAN RIGHT</span><span>RACIAL COVENANTS</span>
</div></div>
</body>
</html>
